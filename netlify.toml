# Netlify config for the World Cup 2026 Tracker static site.
#
# The tracker is a single, self-contained HTML file committed at the repo root
# and refreshed by the daily routine (see CLAUDE.md). There is no build step, so
# Netlify just publishes the repo as-is. Connect this repo to a Netlify site with
# GitHub continuous deployment and every push to `main` (which the daily routine
# already does) auto-publishes the refreshed tracker.
#
# The live file is `world_cup_tracker.html`, but we want the bare domain
# (https://worldcup.youmissedit.org/) to render it directly, so the root path is
# rewritten to the tracker. Dated snapshots stay reachable at
# /snapshots/world_cup_tracker_YYYY-MM-DD.html.

[build]
  publish = "."
  # No build command: the HTML is committed directly, nothing to compile.

# Serve the tracker at the site root without changing the URL (200 = rewrite,
# not a redirect). Other paths (e.g. /snapshots/...) are served normally.
[[redirects]]
  from = "/"
  to = "/world_cup_tracker.html"
  status = 200
