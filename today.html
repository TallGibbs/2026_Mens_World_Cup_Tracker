<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Men's World Cup 2026 - Today's Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EEF1F5;
    --bg-bot:#DFE5EC;
    --ink:#13202E;
    --muted:#5C6B7A;
    --faint:#8A98A6;
    --card:#FFFFFF;
    --hairline:#DCE3EA;
    --hairline-strong:#C7D1DB;
    --band:#0F2233;
    --band-2:#16344B;
    --gold:#E9B949;
    --qual:#1E9E63;
    --third:#E0962B;
    --win:#1E9E63;
    --draw:#C6892A;
    --loss:#C13A3A;
    --shadow:0 1px 2px rgba(19,32,46,.06), 0 6px 18px rgba(19,32,46,.06);
    --radius:14px;
    --header-h:54px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Barlow', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--bg-top), var(--bg-bot));
    background-attachment:fixed;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 64px;}
  .display{font-family:'Barlow Condensed','Barlow',sans-serif;}
  .eyebrow{
    font-family:'Barlow Condensed','Barlow',sans-serif;
    text-transform:uppercase;letter-spacing:.14em;font-weight:600;
    font-size:12px;color:var(--faint);
  }

  /* ---------- Sticky site nav ---------- */
  .skip-link{position:absolute;left:-9999px;top:0;z-index:200;
    background:var(--gold);color:var(--band);padding:9px 14px;border-radius:0 0 8px 0;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;text-decoration:none;}
  .skip-link:focus{left:0;}
  .site-header{position:sticky;top:0;z-index:100;background:var(--band);
    border-bottom:1px solid rgba(233,185,73,.35);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .site-nav{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:18px;
    height:var(--header-h);padding:0 20px;}
  .brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:19px;
    letter-spacing:.045em;text-transform:uppercase;color:#EAF1F8;}
  .brand .ball{width:9px;height:9px;border-radius:50%;background:var(--gold);flex:none;
    box-shadow:0 0 0 3px rgba(233,185,73,.2);}
  .nav-links{display:flex;align-items:stretch;gap:2px;list-style:none;margin:0 0 0 auto;padding:0;}
  .nav-links a{display:inline-flex;align-items:center;min-height:44px;padding:0 14px;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;font-size:15px;
    text-transform:uppercase;letter-spacing:.07em;color:#C9D8E6;text-decoration:none;
    border-bottom:3px solid transparent;transition:color .15s ease;}
  .nav-links a:hover{color:#fff;}
  .nav-links a[aria-current="page"]{color:var(--gold);border-bottom-color:var(--gold);}
  .nav-links a:focus-visible,.brand:focus-visible,.nav-toggle:focus-visible{
    outline:2px solid var(--gold);outline-offset:2px;}
  .nav-toggle{display:none;}
  html{scroll-padding-top:calc(var(--header-h) + 10px);}
  @media (max-width:560px){
    .nav-toggle{display:inline-flex;align-items:center;justify-content:center;margin-left:auto;
      width:44px;height:44px;background:transparent;border:0;color:var(--gold);cursor:pointer;}
    .nav-toggle span,.nav-toggle span::before,.nav-toggle span::after{display:block;
      width:20px;height:2px;background:currentColor;border-radius:2px;}
    .nav-toggle span{position:relative;}
    .nav-toggle span::before{content:"";position:absolute;top:-6px;left:0;}
    .nav-toggle span::after{content:"";position:absolute;top:6px;left:0;}
    .nav-links{position:absolute;left:0;right:0;top:var(--header-h);flex-direction:column;gap:0;
      margin:0;background:var(--band);border-bottom:1px solid rgba(233,185,73,.35);
      box-shadow:var(--shadow);display:none;}
    .nav-links.open{display:flex;}
    .nav-links li{width:100%;}
    .nav-links a{width:100%;min-height:48px;padding:0 20px;border-bottom:0;
      border-left:3px solid transparent;}
    .nav-links a[aria-current="page"]{border-bottom-color:transparent;border-left-color:var(--gold);}
  }

  /* ---------- Hero band ---------- */
  .hero{
    background:linear-gradient(135deg, var(--band), var(--band-2));
    color:#EAF1F8;border-radius:0 0 24px 24px;
    box-shadow:var(--shadow);
    margin:0 -20px 26px;padding:24px 28px 26px;
    position:relative;overflow:hidden;
  }
  .hero-rule{height:2px;margin:13px 0 14px;border-radius:2px;
    background:linear-gradient(90deg, var(--gold), rgba(233,185,73,0));}
  .hero h1{
    font-family:'Barlow Condensed','Barlow',sans-serif;
    font-weight:700;font-size:40px;line-height:1;margin:10px 0 8px;letter-spacing:.005em;
  }
  .hero .date{color:#C9D8E6;font-size:15px;font-weight:500;}
  .hero .tz{margin-top:14px;color:#9FB6CC;font-size:13px;}
  .hero .tz b{color:#EAF1F8;font-weight:600;}
  .stage-tag{
    display:inline-block;margin-left:10px;padding:3px 10px;border-radius:999px;
    background:rgba(233,185,73,.16);color:var(--gold);
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;font-size:12px;vertical-align:3px;
    border:1px solid rgba(233,185,73,.35);
  }

  /* ---------- Section heads ---------- */
  .section-head{display:flex;align-items:baseline;gap:12px;margin:6px 2px 16px;}
  .section-head h2{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;
    font-size:24px;margin:0;letter-spacing:.01em;}
  .section-head .note{color:var(--muted);font-size:13.5px;}

  /* ---------- Game cards ---------- */
  .games{display:flex;flex-direction:column;gap:18px;}
  .gamecard{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;}
  .gc-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding:14px 18px;border-bottom:1px solid var(--hairline);background:#F7F9FB;}
  .gc-stage{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.09em;font-weight:600;font-size:12.5px;color:var(--muted);}
  .gc-time{display:flex;align-items:center;gap:9px;}
  .gc-kick{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:18px;}
  .badge{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.08em;font-weight:700;font-size:11px;padding:3px 9px;border-radius:999px;}
  .badge.upcoming{background:#EAF0F6;color:var(--muted);}
  .badge.next{background:rgba(233,185,73,.18);color:#A9791A;border:1px solid rgba(233,185,73,.45);}
  .badge.live{background:rgba(30,158,99,.14);color:var(--win);display:inline-flex;align-items:center;gap:6px;}
  .badge.ft{background:#EDEFF2;color:var(--faint);}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#3ad07a;display:inline-block;
    box-shadow:0 0 0 0 rgba(58,208,122,.6);}

  .gc-body{display:grid;grid-template-columns:1.15fr 1fr;gap:0;}
  .gc-main{padding:18px 18px 20px;}
  .gc-side{padding:18px 18px 20px;border-left:1px solid var(--hairline);background:#FCFDFE;}
  @media (max-width:760px){
    .gc-body{grid-template-columns:1fr;}
    .gc-side{border-left:0;border-top:1px solid var(--hairline);}
  }

  .matchup{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:6px;}
  .side{display:flex;align-items:center;gap:11px;flex:1;min-width:0;}
  .side.away{flex-direction:row-reverse;text-align:right;}
  .kit{width:7px;height:34px;border-radius:4px;flex:none;}
  .tname{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:26px;line-height:1;}
  .tmeta{font-size:12.5px;color:var(--faint);margin-top:3px;}
  .vs{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;color:var(--faint);
    font-size:14px;text-transform:uppercase;letter-spacing:.08em;flex:none;}

  .watch{display:flex;flex-wrap:wrap;gap:8px 18px;margin:16px 0 4px;font-size:13.5px;color:var(--muted);}
  .watch .row{display:flex;align-items:center;gap:8px;}
  .watch .lab{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.07em;font-size:11px;font-weight:600;color:var(--faint);}
  .watch b{color:var(--ink);font-weight:600;}

  .bullets{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:9px;}
  .bullets li{position:relative;padding-left:18px;font-size:13.5px;color:var(--ink);}
  .bullets li::before{content:"";position:absolute;left:2px;top:8px;width:6px;height:6px;
    border-radius:50%;background:var(--gold);}

  .side-h{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.09em;font-weight:600;font-size:11.5px;color:var(--faint);margin-bottom:8px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;letter-spacing:.05em;
    font-size:10.5px;color:var(--faint);font-weight:600;padding:5px 5px;text-align:center;border-bottom:1px solid var(--hairline);}
  thead th.tm{text-align:left;padding-left:8px;}
  tbody td{padding:7px 5px;text-align:center;border-bottom:1px solid #EEF2F6;}
  tbody tr:last-child td{border-bottom:0;}
  td.tm{text-align:left;padding-left:4px;}
  .teamcell{display:flex;align-items:center;gap:8px;}
  .qedge{width:4px;height:18px;border-radius:3px;background:transparent;flex:none;}
  tr.q-auto .qedge{background:var(--qual);}
  tr.q-third .qedge{background:var(--third);}
  .teamcell .tn{font-weight:600;}
  td.pts{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:15px;}
  tr.playing{background:rgba(233,185,73,.13);}
  tr.playing .tn{font-weight:700;}
  .gd-pos{color:var(--qual);} .gd-neg{color:var(--loss);}
  .standnote{font-size:11.5px;color:var(--faint);margin-top:9px;}

  /* ---------- Footer ---------- */
  .legend{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin:24px 2px 0;color:var(--muted);font-size:13px;}
  .legend .k{display:inline-flex;align-items:center;gap:7px;}
  .legend .sw{width:14px;height:14px;border-radius:4px;}
  .footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--hairline);
    display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;color:var(--faint);font-size:12.5px;}
  .footer b{color:var(--muted);font-weight:600;}
  .footer a{color:var(--muted);font-weight:600;text-decoration:none;border-bottom:1px solid var(--hairline-strong);}
  .footer a:hover{color:var(--ink);}
  .empty{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:26px 20px;color:var(--muted);font-size:15px;}

  @media (max-width:880px){ .hero h1{font-size:34px;} }
  @media (prefers-reduced-motion:no-preference){
    .live-dot{animation:pulse 1.8s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,208,122,.5);}70%{box-shadow:0 0 0 7px rgba(58,208,122,0);}100%{box-shadow:0 0 0 0 rgba(58,208,122,0);}}
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <nav class="site-nav" aria-label="Primary">
    <a class="brand" href="/"><span class="ball" aria-hidden="true"></span>Men's World Cup 2026</a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links" aria-label="Open menu"><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Tracker</a></li>
      <li><a href="/today" aria-current="page">Today's Games</a></li>
    </ul>
  </nav>
</header>
<main id="main">
<div class="wrap">

  <header class="hero">
    <h1 id="t-title">Today's Games<span class="stage-tag" id="t-stage"></span></h1>
    <div class="date" id="t-date"></div>
    <div class="hero-rule"></div>
    <div class="tz" id="t-tz"></div>
  </header>

  <section aria-label="Today's matches">
    <div class="section-head">
      <h2>Match schedule</h2>
      <span class="note" id="sched-note"></span>
    </div>
    <div class="games" id="games"></div>
  </section>

  <div class="legend">
    <span class="k"><span class="sw" style="background:var(--qual)"></span> Top 2 advance</span>
    <span class="k"><span class="sw" style="background:var(--third)"></span> 3rd place (8 best advance)</span>
    <span class="k" style="color:var(--faint)">Highlighted rows are the teams in action today.</span>
  </div>

  <div class="footer">
    <span>Times shown in <b>ET</b>. Standings are <b>before</b> today's matches kick off &middot; <a href="/">full group standings</a></span>
    <span id="updated"></span>
  </div>

</div>
</main>

<script src="/data.js"></script>
<script>
/* =========================================================================
   This page renders from the shared WC object defined in data.js (loaded
   above): WC.today for the day's games, and WC.groups for each game's standings
   mini-table (no separate standings copy). The daily routine edits data.js, NOT
   this file. Do not change the markup, CSS, or the JavaScript below.
   ========================================================================= */
const TODAY = WC.today;

/* =========================== rendering =========================== */
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kitFor(name){return (TODAY.kits&&TODAY.kits[name])||"var(--hairline-strong)";}

/* ---- header text ---- */
document.getElementById('t-stage').textContent = TODAY.stageLabel;
document.getElementById('t-date').textContent  = TODAY.date;
document.getElementById('t-tz').innerHTML       = esc(TODAY.tz);
document.getElementById('sched-note').textContent = TODAY.schedNote;
document.getElementById('updated').innerHTML   = "Refreshed <b>"+esc(WC.meta.updated)+"</b>";

/* ---- which game is "next up" (first that hasn't kicked off) ---- */
function statusFor(iso){
  const now = Date.now(), k = +new Date(iso);
  if(now < k) return 'upcoming';
  if(now < k + 150*60000) return 'live';   // ~2.5h window covers added time
  return 'ft';
}
function nextUpcomingIso(){
  const now = Date.now();
  const up = TODAY.games.map(g=>+new Date(g.iso)).filter(k=>k>now).sort((a,b)=>a-b);
  return up.length ? up[0] : null;
}

/* ---- one group mini-table, highlighting the two teams in this game ---- */
function miniTable(g){
  const rows = ((WC.groups.find(x=>x.id===g.group)||{}).rows)||[];
  const playing = [g.home, g.away];
  const body = rows.map((r,i)=>{
    const cls=[];
    if(i<2) cls.push('q-auto'); else if(i===2) cls.push('q-third');
    if(playing.includes(r.team)) cls.push('playing');
    const gd = r.gd>0?'<span class="gd-pos">+'+r.gd+'</span>':(r.gd<0?'<span class="gd-neg">'+r.gd+'</span>':'0');
    return '<tr class="'+cls.join(' ')+'">'+
      '<td class="tm"><span class="teamcell"><span class="qedge"></span><span class="tn">'+esc(r.team)+'</span></span></td>'+
      '<td>'+r.pld+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td>'+
      '<td>'+gd+'</td><td class="pts">'+r.pts+'</td></tr>';
  }).join('');
  return '<div class="side-h">Group '+esc(g.group)+' &middot; before today</div>'+
    '<table><thead><tr><th class="tm">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>'+
    '<tbody>'+body+'</tbody></table>'+
    '<div class="standnote">Highlighted = playing now &middot; updated after full time on the main tracker.</div>';
}

function badgeFor(iso, isNext){
  const st = statusFor(iso);
  if(st==='live') return '<span class="badge live"><span class="live-dot"></span>Live</span>';
  if(st==='ft')   return '<span class="badge ft">Full time</span>';
  if(isNext)      return '<span class="badge next">Next up</span>';
  return '<span class="badge upcoming">Upcoming</span>';
}

function renderGames(){
  const wrap = document.getElementById('games');
  wrap.innerHTML='';
  if(!TODAY.games.length){
    wrap.appendChild(el('<div class="empty">No matches scheduled today. Check the <a href="/">tracker</a> for the next round.</div>'));
    return;
  }
  const nextIso = nextUpcomingIso();
  TODAY.games.forEach(g=>{
    const isNext = nextIso && (+new Date(g.iso)===nextIso);
    const bullets = '<ul class="bullets">'+g.bullets.map(b=>'<li>'+esc(b)+'</li>').join('')+'</ul>';
    const card = el(
      '<article class="gamecard">'+
        '<div class="gc-top">'+
          '<span class="gc-stage">'+esc(g.stage)+'</span>'+
          '<span class="gc-time"><span class="gc-kick">'+esc(g.kick)+'</span>'+badgeFor(g.iso, isNext)+'</span>'+
        '</div>'+
        '<div class="gc-body">'+
          '<div class="gc-main">'+
            '<div class="matchup">'+
              '<span class="side home"><span class="kit" style="background:'+kitFor(g.home)+'"></span>'+
                '<span><span class="tname">'+esc(g.home)+'</span></span></span>'+
              '<span class="vs">v</span>'+
              '<span class="side away"><span class="kit" style="background:'+kitFor(g.away)+'"></span>'+
                '<span><span class="tname">'+esc(g.away)+'</span></span></span>'+
            '</div>'+
            '<div class="watch">'+
              '<span class="row"><span class="lab">Venue</span><b>'+esc(g.venue)+'</b></span>'+
              '<span class="row"><span class="lab">TV</span><b>'+esc(g.tv)+'</b></span>'+
              '<span class="row"><span class="lab">Stream</span><b>'+esc(g.stream)+'</b></span>'+
            '</div>'+
            bullets+
          '</div>'+
          '<div class="gc-side">'+miniTable(g)+'</div>'+
        '</div>'+
      '</article>');
    wrap.appendChild(card);
  });
}

renderGames();
/* keep the live / next-up badges fresh as the day rolls on */
setInterval(renderGames, 60000);

/* ---- sticky nav: mobile menu toggle ---- */
(function(){
  const t=document.querySelector('.nav-toggle'), l=document.getElementById('nav-links');
  if(!t||!l) return;
  t.addEventListener('click',()=>{
    const open=l.classList.toggle('open');
    t.setAttribute('aria-expanded', String(open));
  });
})();
</script>
</body>
</html>
