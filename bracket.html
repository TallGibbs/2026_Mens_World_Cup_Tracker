<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Men's World Cup 2026 - Bracket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EEF1F5;
    --bg-bot:#DFE5EC;
    --ink:#13202E;
    --muted:#5C6B7A;
    --faint:#8A98A6;
    --card:#FFFFFF;
    --hairline:#DCE3EA;
    --hairline-strong:#C7D1DB;
    --band:#0F2233;
    --band-2:#16344B;
    --gold:#E9B949;
    --qual:#1E9E63;
    --third:#E0962B;
    --win:#1E9E63;
    --draw:#C6892A;
    --loss:#C13A3A;
    --usa-a:#0A3161; --usa-b:#B31942;
    --ned-a:#F36C21; --ned-b:#C5521A;
    --eng-a:#CE1124; --eng-b:#1B2A4A;
    --shadow:0 1px 2px rgba(19,32,46,.06), 0 6px 18px rgba(19,32,46,.06);
    --radius:14px;
    --header-h:54px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Barlow', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--bg-top), var(--bg-bot));
    background-attachment:fixed;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 64px;}
  .display{font-family:'Barlow Condensed','Barlow',sans-serif;}
  .eyebrow{
    font-family:'Barlow Condensed','Barlow',sans-serif;
    text-transform:uppercase;letter-spacing:.14em;font-weight:600;
    font-size:12px;color:var(--faint);
  }

  /* ---------- Sticky site nav ---------- */
  .skip-link{position:absolute;left:-9999px;top:0;z-index:200;
    background:var(--gold);color:var(--band);padding:9px 14px;border-radius:0 0 8px 0;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;text-decoration:none;}
  .skip-link:focus{left:0;}
  .site-header{position:sticky;top:0;z-index:100;background:var(--band);
    border-bottom:1px solid rgba(233,185,73,.35);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .site-nav{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:18px;
    height:var(--header-h);padding:0 20px;}
  .brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:19px;
    letter-spacing:.045em;text-transform:uppercase;color:#EAF1F8;}
  .brand .ball{width:9px;height:9px;border-radius:50%;background:var(--gold);flex:none;
    box-shadow:0 0 0 3px rgba(233,185,73,.2);}
  .nav-links{display:flex;align-items:stretch;gap:2px;list-style:none;margin:0 0 0 auto;padding:0;}
  .nav-links a{display:inline-flex;align-items:center;min-height:44px;padding:0 14px;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;font-size:15px;
    text-transform:uppercase;letter-spacing:.07em;color:#C9D8E6;text-decoration:none;
    border-bottom:3px solid transparent;transition:color .15s ease;}
  .nav-links a:hover{color:#fff;}
  .nav-links a[aria-current="page"]{color:var(--gold);border-bottom-color:var(--gold);}
  .nav-links a:focus-visible,.brand:focus-visible,.nav-toggle:focus-visible{
    outline:2px solid var(--gold);outline-offset:2px;}
  .nav-toggle{display:none;}
  html{scroll-padding-top:calc(var(--header-h) + 10px);}
  @media (max-width:560px){
    .nav-toggle{display:inline-flex;align-items:center;justify-content:center;margin-left:auto;
      width:44px;height:44px;background:transparent;border:0;color:var(--gold);cursor:pointer;}
    .nav-toggle span,.nav-toggle span::before,.nav-toggle span::after{display:block;
      width:20px;height:2px;background:currentColor;border-radius:2px;}
    .nav-toggle span{position:relative;}
    .nav-toggle span::before{content:"";position:absolute;top:-6px;left:0;}
    .nav-toggle span::after{content:"";position:absolute;top:6px;left:0;}
    .nav-links{position:absolute;left:0;right:0;top:var(--header-h);flex-direction:column;gap:0;
      margin:0;background:var(--band);border-bottom:1px solid rgba(233,185,73,.35);
      box-shadow:var(--shadow);display:none;}
    .nav-links.open{display:flex;}
    .nav-links li{width:100%;}
    .nav-links a{width:100%;min-height:48px;padding:0 20px;border-bottom:0;
      border-left:3px solid transparent;}
    .nav-links a[aria-current="page"]{border-bottom-color:transparent;border-left-color:var(--gold);}
  }

  /* ---------- Hero band ---------- */
  .hero{
    background:linear-gradient(135deg, var(--band), var(--band-2));
    color:#EAF1F8;border-radius:0 0 24px 24px;
    box-shadow:var(--shadow);
    margin:0 -20px 26px;padding:26px 28px 28px;
    position:relative;overflow:hidden;
  }
  .hero-inner{display:grid;grid-template-columns:1fr 1.05fr;
    grid-template-areas:"title nextup" "ondeck nextup";
    column-gap:28px;row-gap:0;align-items:start;}
  .hero-title{grid-area:title;}
  .ondeck-left{grid-area:ondeck;}
  .hero-title h1{
    font-family:'Barlow Condensed','Barlow',sans-serif;
    font-weight:700;font-size:42px;line-height:.98;margin:6px 0 6px;letter-spacing:.005em;
  }
  /* gold accent rule - confined to the left title column, fades out before the next-up card */
  .hero-rule{height:2px;border-radius:2px;margin:2px 0 13px;
    background:linear-gradient(90deg, var(--gold), rgba(233,185,73,0));}
  .hero-title .sub{color:#9FB6CC;font-size:16px;font-weight:500;}
  .hero-title .where{margin-top:14px;color:#C9D8E6;font-size:14.5px;}
  .hero-title .where b{color:#EAF1F8;font-weight:600;}
  .stage-tag{
    display:inline-block;margin-top:12px;padding:4px 11px;border-radius:999px;
    background:rgba(233,185,73,.16);color:var(--gold);
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;font-size:12px;
    border:1px solid rgba(233,185,73,.35);
  }

  /* Next-up card inside hero */
  .nextup{grid-area:nextup;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:16px;padding:18px 20px;backdrop-filter:blur(2px);}
  .nextup .label{display:flex;align-items:center;gap:8px;color:#A9C0D6;
    font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.12em;font-weight:600;font-size:13.5px;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#3ad07a;display:inline-block;
    box-shadow:0 0 0 0 rgba(58,208,122,.6);}
  .nextup .match{display:flex;align-items:center;gap:13px;margin:12px 0 4px;flex-wrap:wrap;}
  .nextup .team{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;
    font-size:32px;line-height:1;display:flex;align-items:center;gap:10px;}
  .nextup .team.opp{font-size:27px;}
  .nextup .vs{color:#7F95AB;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
  .kit{width:7px;height:28px;border-radius:3px;display:inline-block;}
  .countdown{display:flex;gap:10px;margin:15px 0 4px;}
  .cd-cell{background:rgba(0,0,0,.18);border-radius:10px;padding:9px 0;min-width:64px;text-align:center;}
  .cd-cell .n{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:32px;line-height:1;color:#fff;}
  .cd-cell .u{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9FB6CC;margin-top:4px;}
  .nextup .meta{color:#D2DFEC;font-size:14.5px;margin-top:10px;}
  .nextup .meta span{white-space:nowrap;}
  /* Next-up details: standings + context for the upcoming game */
  .hx-details{margin-top:14px;border-top:1px solid rgba(255,255,255,.12);padding-top:13px;}
  .hx-h{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.12em;font-weight:600;font-size:11.5px;color:#7F95AB;margin-bottom:8px;}
  .hx-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .hx-table th{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.05em;font-size:10.5px;color:#7F95AB;font-weight:600;padding:4px 5px;text-align:center;
    border-bottom:1px solid rgba(255,255,255,.14);}
  .hx-table th.tm{text-align:left;padding-left:9px;}
  .hx-table td{padding:7px 5px;text-align:center;color:#C9D8E6;border-bottom:1px solid rgba(255,255,255,.06);}
  .hx-table tr:last-child td{border-bottom:0;}
  .hx-table td.tm{text-align:left;color:#EAF1F8;font-weight:600;border-left:3px solid transparent;padding-left:6px;}
  .hx-table td.pts{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:15px;color:#fff;}
  .hx-table tr.q-auto td.tm{border-left-color:var(--qual);}
  .hx-table tr.q-third td.tm{border-left-color:var(--third);}
  .hx-table tr.hl td{background:rgba(233,185,73,.16);}
  .hx-table tr.hl td.tm{color:#fff;font-weight:700;}
  .hx-h2{margin-top:14px;}
  .hx-prev{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:7px;}
  .hx-prev li{position:relative;padding-left:16px;font-size:13.5px;color:#C9D8E6;line-height:1.45;}
  .hx-prev li::before{content:"";position:absolute;left:2px;top:7px;width:5px;height:5px;
    border-radius:50%;background:var(--gold);}
  .ondeck{margin-top:14px;border-top:1px solid rgba(255,255,255,.12);padding-top:12px;}
  .ondeck .h{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.12em;font-weight:600;font-size:11.5px;color:#7F95AB;margin-bottom:7px;}
  .ondeck ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
  .ondeck li{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:#D6E2EE;}
  .ondeck .od-kit{width:5px;height:15px;border-radius:3px;margin-top:2px;flex:none;}
  .ondeck .od-body{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .ondeck .od-top{display:flex;align-items:baseline;gap:10px;}
  .ondeck .od-date{color:#8FA6BB;font-size:12.5px;min-width:88px;font-weight:500;flex:none;}
  .ondeck .od-sub{color:#8FA6BB;font-size:12px;}
  .ondeck .od-sub span{white-space:nowrap;}

  /* ---------- Controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--hairline);border-radius:11px;padding:4px;box-shadow:var(--shadow);}
  .seg button{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;font-size:13px;
    border:0;background:transparent;color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;}
  .seg button[aria-pressed="true"]{background:var(--band);color:#fff;}
  .seg button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .search{position:relative;}
  .search input{font-family:'Barlow',sans-serif;font-size:14px;color:var(--ink);
    border:1px solid var(--hairline);background:var(--card);border-radius:11px;
    padding:10px 14px 10px 36px;width:240px;box-shadow:var(--shadow);}
  .search input:focus-visible{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--hairline-strong);}
  .search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:13px;height:13px;
    border:2px solid var(--faint);border-radius:50%;}
  .search .ico::after{content:"";position:absolute;width:6px;height:2px;background:var(--faint);
    transform:rotate(45deg);right:-4px;bottom:-1px;border-radius:2px;}

  /* ---------- Section heads ---------- */
  .section-head{display:flex;align-items:baseline;gap:12px;margin:6px 0 14px;}
  .section-head h2{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;
    font-size:24px;margin:0;letter-spacing:.01em;}
  .section-head .note{color:var(--muted);font-size:13.5px;}

  /* ---------- Featured team cards ---------- */
  .teams{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:34px;}
  .tcard{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
  .tcard .stripe{height:7px;}
  .tcard .body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:12px;flex:1;}
  .tcard .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .tcard .name{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:27px;line-height:1;}
  .tcard .grp{color:var(--muted);font-size:13px;font-weight:600;margin-top:3px;}
  .pos{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:54px;background:#F2F5F8;border:1px solid var(--hairline);border-radius:10px;padding:6px 4px;}
  .pos .p{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1;}
  .pos .pl{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:2px;}
  .pos .pts{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px;}
  .rowline{display:flex;align-items:center;gap:10px;font-size:14px;}
  .rowline .tag{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;
    letter-spacing:.08em;font-size:11px;font-weight:600;color:var(--faint);min-width:48px;}
  .pill{display:inline-flex;align-items:center;gap:7px;font-weight:600;}
  .wl{width:20px;height:20px;border-radius:6px;color:#fff;display:inline-flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:13px;}
  .wl.W{background:var(--win);} .wl.D{background:var(--draw);} .wl.L{background:var(--loss);}
  .score{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:15px;}
  .next-d{color:var(--ink);font-weight:600;}
  .next-x{color:var(--muted);font-size:13px;}
  .tnote{font-size:12.5px;color:var(--faint);border-top:1px dashed var(--hairline);padding-top:10px;margin-top:auto;}
  .pending{color:var(--faint);font-style:normal;}

  /* ---------- Standings ---------- */
  .groups{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .gcard{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .gcard.fav{border-color:var(--hairline-strong);}
  .ghead{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:transparent;border:0;cursor:pointer;padding:14px 16px;text-align:left;}
  .ghead:focus-visible{outline:2px solid var(--gold);outline-offset:-2px;}
  .ghead .gt{display:flex;align-items:center;gap:10px;}
  .ghead .gname{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:19px;letter-spacing:.02em;}
  .ghead .gstatus{font-size:12px;color:var(--faint);font-weight:600;}
  .fav-flag{font-family:'Barlow Condensed','Barlow',sans-serif;font-size:10.5px;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;color:#fff;background:var(--band);border-radius:999px;padding:2px 8px;}
  .chev{width:9px;height:9px;border-right:2px solid var(--faint);border-bottom:2px solid var(--faint);
    transform:rotate(45deg);transition:transform .18s ease;flex:none;margin-right:2px;}
  .gcard.collapsed .chev{transform:rotate(-45deg);}
  .gbody{padding:0 8px 10px;}
  .gcard.collapsed .gbody{display:none;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;letter-spacing:.06em;
    font-size:11px;color:var(--faint);font-weight:600;padding:6px 6px;text-align:center;border-bottom:1px solid var(--hairline);}
  thead th.tm{text-align:left;padding-left:10px;}
  tbody td{padding:8px 6px;text-align:center;border-bottom:1px solid #EEF2F6;}
  tbody tr:last-child td{border-bottom:0;}
  td.tm{text-align:left;padding-left:6px;}
  .teamcell{display:flex;align-items:center;gap:9px;}
  .qedge{width:4px;height:20px;border-radius:3px;background:transparent;flex:none;}
  tr.q-auto .qedge{background:var(--qual);}
  tr.q-third .qedge{background:var(--third);}
  .teamcell .tn{font-weight:600;}
  td.pts{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:16px;}
  tr.favrow{background:linear-gradient(90deg, rgba(15,34,51,.05), rgba(15,34,51,0));}
  tr.favrow .tn{font-weight:700;}
  tr.kit-USA .qedge{background:linear-gradient(180deg,var(--usa-a),var(--usa-b))!important;}
  tr.kit-Netherlands .qedge{background:var(--ned-a)!important;}
  tr.kit-England .qedge{background:linear-gradient(180deg,var(--eng-a),var(--eng-b))!important;}
  tr.row-hit{background:rgba(233,185,73,.18);}
  .gd-pos{color:var(--qual);} .gd-neg{color:var(--loss);}
  .muted-dash{color:var(--faint);}

  /* ---------- Legend + footer ---------- */
  .legend{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin:22px 2px 0;color:var(--muted);font-size:13px;}
  .legend .k{display:inline-flex;align-items:center;gap:7px;}
  .legend .sw{width:14px;height:14px;border-radius:4px;}
  .footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--hairline);
    display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;color:var(--faint);font-size:12.5px;}
  .footer b{color:var(--muted);font-weight:600;}
  .no-result{color:var(--muted);font-size:14px;padding:18px 2px;display:none;}

  @media (max-width:880px){
    .hero-inner{grid-template-columns:1fr;grid-template-areas:"title" "nextup" "ondeck";row-gap:18px;}
    .teams{grid-template-columns:1fr;}
    .groups{grid-template-columns:1fr;}
    .hero-title h1{font-size:36px;}
  }
  @media (max-width:560px){
    .search input{width:100%;}
    .search{flex:1;}
    .countdown{gap:7px;}
    .cd-cell{min-width:0;flex:1;}
    .nextup .team{font-size:25px;}
    .nextup .team.opp{font-size:22px;}
    .cd-cell .n{font-size:28px;}
  }
  @media (prefers-reduced-motion:no-preference){
    .live-dot{animation:pulse 1.8s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,208,122,.5);}70%{box-shadow:0 0 0 8px rgba(58,208,122,0);}100%{box-shadow:0 0 0 0 rgba(58,208,122,0);}}
  }

  /* ---------- Bracket page ---------- */
  .bracket-hero{margin:16px 2px 14px;}
  .bracket-hero h1{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:38px;line-height:1;margin:4px 0 0;letter-spacing:.005em;}
  .bracket-note{color:var(--muted);font-size:14px;margin:11px 2px 0;max-width:66ch;}
  .bracket-scroll{display:flex;gap:18px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x proximity;}
  .round-col{flex:0 0 290px;min-width:290px;scroll-snap-align:start;}
  .round-head{display:flex;align-items:baseline;gap:10px;margin:6px 0 12px;}
  .round-head h2{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:22px;margin:0;letter-spacing:.01em;}
  .round-head .rc-count{color:var(--muted);font-size:12.5px;}
  .round-list{display:flex;flex-direction:column;gap:14px;}

  .bmatch{background:var(--card);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .bm-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;background:#F7F9FB;border-bottom:1px solid var(--hairline);}
  .bm-id{font-family:'Barlow Condensed','Barlow',sans-serif;text-transform:uppercase;letter-spacing:.07em;font-size:11px;font-weight:700;color:var(--faint);}
  .bm-state{font-size:12px;font-weight:600;color:var(--muted);}
  .bm-state.final{color:var(--faint);}

  .bm-row{display:flex;align-items:center;gap:10px;padding:9px 12px;}
  .bm-row + .bm-row{border-top:1px solid #EEF2F6;}
  .bm-kit{width:4px;height:22px;border-radius:3px;flex:none;}
  .bm-team{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;font-size:17px;}
  .bm-from{margin-left:auto;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-family:'Barlow Condensed','Barlow',sans-serif;text-align:right;}
  .bm-score{margin-left:auto;font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:700;font-size:18px;color:var(--ink);}
  .bm-row.winner .bm-team{font-weight:700;color:var(--ink);}
  .bm-row.loser .bm-team,.bm-row.loser .bm-score{color:var(--faint);}
  .bm-row.unresolved .bm-team{color:var(--faint);font-weight:600;}
  .bm-foot{padding:8px 12px;border-top:1px solid #EEF2F6;color:var(--faint);font-size:12px;}

  /* mobile: one round at a time + sticky selector (720px, wider than site 560px) */
  .round-select{display:none;}
  @media (max-width:720px){
    .bracket-scroll{display:block;overflow-x:visible;}
    .round-select{display:flex;gap:4px;overflow-x:auto;position:sticky;top:var(--header-h);z-index:50;
      background:var(--bg-top);padding:8px 2px;margin:0 0 6px;}
    .round-select button{font-family:'Barlow Condensed','Barlow',sans-serif;font-weight:600;
      text-transform:uppercase;letter-spacing:.06em;font-size:13px;white-space:nowrap;
      border:1px solid var(--hairline);background:var(--card);color:var(--muted);
      padding:8px 14px;border-radius:9px;cursor:pointer;box-shadow:var(--shadow);}
    .round-select button[aria-pressed="true"]{background:var(--band);color:#fff;border-color:var(--band);}
    .round-select button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
    .round-col{flex:none;min-width:0;display:none;margin-bottom:8px;}
    .round-col.active{display:block;}
    .round-list{gap:12px;}
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <nav class="site-nav" aria-label="Primary">
    <a class="brand" href="/"><span class="ball" aria-hidden="true"></span>Men's World Cup 2026</a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links" aria-label="Open menu"><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="/">Tracker</a></li>
      <li><a href="/today">Today's Games</a></li>
      <li><a href="/bracket" aria-current="page">Bracket</a></li>
    </ul>
  </nav>
</header>
<main id="main">
<div class="wrap">

  <header class="bracket-hero">
    <div class="eyebrow">Knockout stage</div>
    <h1>Bracket</h1>
    <div class="hero-rule"></div>
    <p class="bracket-note" id="bracket-note"></p>
  </header>

  <div class="legend">
    <span class="k"><span class="sw" style="background:var(--qual)"></span> Winner advances</span>
    <span class="k"><span class="sw" style="background:var(--third)"></span> Best third-placed entrant</span>
  </div>

  <nav class="round-select" id="round-select" role="group" aria-label="Choose a round to view"></nav>

  <section aria-label="Knockout bracket" id="bracket-desktop" class="bracket-scroll"></section>

  <div class="footer">
    <span>Times shown in <b>ET</b>. Single elimination &middot; winners advance; the two losing semi-finalists meet in the third-place play-off.</span>
    <span id="updated"></span>
  </div>

</div>
</main>

<script src="/data.js"></script>
<script>
/* =========================================================================
   The bracket page renders from WC.bracket in data.js (loaded above). The daily
   routine edits data.js, NOT this file. Do not change the markup, CSS, or the
   JavaScript below. Placeholder-tolerant: a slot shows its resolved team when
   known, else its descriptor, so the whole tree renders before teams are set.
   ========================================================================= */
const WCB = (WC.bracket && WC.bracket.rounds) || [];
const PHASE = (WC.meta && WC.meta.phase) || "group";

function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function kitFor(name){ return (WC.today && WC.today.kits && WC.today.kits[name]) || "var(--hairline-strong)"; }

document.getElementById('updated').innerHTML = "Refreshed <b>"+esc(WC.meta.updated)+"</b>";

const SHORT = {r32:"R32", r16:"R16", qf:"QF", sf:"SF", third:"3rd", final:"Final"};

function renderRow(team, descriptor, isWinner, isLoser, score){
  const resolved = !!team;
  const cls = ["bm-row"];
  if(!resolved) cls.push("unresolved");
  else if(isWinner) cls.push("winner");
  else if(isLoser) cls.push("loser");
  const label = esc(resolved ? team : descriptor);
  const from  = resolved ? '<span class="bm-from">'+esc(descriptor)+'</span>' : '';
  const sc    = (score!=null) ? '<span class="bm-score">'+score+'</span>' : '';
  return '<div class="'+cls.join(' ')+'">'+
    '<span class="bm-kit" style="background:'+kitFor(team)+'"></span>'+
    '<span class="bm-team">'+label+'</span>'+from+sc+'</div>';
}

function renderMatch(m){
  const fin = m.status==="final";
  const hw = fin && m.winner===m.homeTeam, aw = fin && m.winner===m.awayTeam;
  const state = fin ? '<span class="bm-state final">Full time</span>'
             : '<span class="bm-state upcoming">'+esc(m.kick||"")+'</span>';
  const pens = (fin && m.pens) ? ' &middot; won '+esc(m.pens)+' on penalties' : '';
  const hl = m.homeTeam || m.home, al = m.awayTeam || m.away;
  let aria = esc(m.id)+': '+esc(hl)+' versus '+esc(al);
  if(fin) aria += ', full time '+esc(hl)+' '+m.hs+', '+esc(al)+' '+m.as+(m.pens?' (won '+esc(m.pens)+' on penalties)':'');
  return '<article class="bmatch" data-status="'+esc(m.status)+'" aria-label="'+aria+'">'+
    '<div class="bm-head"><span class="bm-id">'+esc(m.id)+'</span>'+state+'</div>'+
    renderRow(m.homeTeam, m.home, hw, fin&&!hw, fin?m.hs:null)+
    renderRow(m.awayTeam, m.away, aw, fin&&!aw, fin?m.as:null)+
    '<div class="bm-foot">'+esc(m.venue||"")+(m.tv?' &middot; '+esc(m.tv):'')+pens+'</div>'+
  '</article>';
}

function earliestUnfinished(){
  for(const rd of WCB){ if((rd.matches||[]).some(m=>m.status!=="final")) return rd.key; }
  return WCB.length ? WCB[WCB.length-1].key : null;   // all final -> Final; none -> null
}

function buildBracket(){
  const host = document.getElementById('bracket-desktop');
  const sel  = document.getElementById('round-select');
  const note = document.getElementById('bracket-note');

  if(!WCB.length){
    if(note) note.textContent = "The bracket opens after the group stage.";
    host.innerHTML = '<article class="bmatch"><div class="bm-foot" style="padding:14px 16px;font-size:14px;color:var(--muted)">'+
      'Bracket opens June 28 - check back after the group stage.</div></article>';
    return;
  }
  if(note){
    note.textContent = PHASE==="group"
      ? "The knockout bracket fills in as groups finish. Round of 32 begins June 28."
      : "Winners advance through the tree; the two losing semi-finalists meet in the third-place play-off.";
  }

  host.innerHTML = WCB.map(function(rd){
    const n = (rd.matches||[]).length;
    const cards = (rd.matches||[]).map(renderMatch).join('');
    return '<div class="round-col" data-round="'+esc(rd.key)+'">'+
      '<div class="round-head"><h2>'+esc(rd.label)+'</h2><span class="rc-count">'+n+(n===1?' tie':' ties')+'</span></div>'+
      '<div class="round-list">'+cards+'</div>'+
    '</div>';
  }).join('');

  sel.innerHTML = WCB.map(function(rd){
    return '<button data-round="'+esc(rd.key)+'" aria-pressed="false">'+esc(SHORT[rd.key]||rd.label)+'</button>';
  }).join('');

  const cols = Array.prototype.slice.call(host.querySelectorAll('.round-col'));
  const btns = Array.prototype.slice.call(sel.querySelectorAll('button'));
  function select(key){
    cols.forEach(function(c){ c.classList.toggle('active', c.getAttribute('data-round')===key); });
    btns.forEach(function(b){ b.setAttribute('aria-pressed', String(b.getAttribute('data-round')===key)); });
  }
  btns.forEach(function(b){ b.addEventListener('click', function(){ select(b.getAttribute('data-round')); }); });
  select(earliestUnfinished() || (WCB[0] && WCB[0].key));
}
buildBracket();

/* ---- sticky nav: mobile menu toggle ---- */
(function(){
  const t=document.querySelector('.nav-toggle'), l=document.getElementById('nav-links');
  if(!t||!l) return;
  t.addEventListener('click',()=>{
    const open=l.classList.toggle('open');
    t.setAttribute('aria-expanded', String(open));
  });
})();
</script>
</body>
</html>
